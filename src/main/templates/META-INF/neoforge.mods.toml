modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="Mafuyu404"
description="TaCZ addon"

# Enable if your project still has src/main/resources/taczaddon.mixins.json
[[mixins]]
config="${mod_id}.mixins.json"

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="tacz"
type="required"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="jei"
type="optional"
ordering="AFTER"
side="CLIENT"

[[dependencies.${mod_id}]]
modId="shouldersurfing"
type="optional"
ordering="AFTER"
side="CLIENT"

[[dependencies.${mod_id}]]
modId="sophisticatedbackpacks"
type="optional"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="sophisticatedcore"
type="optional"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="curios"
type="optional"
ordering="AFTER"
side="BOTH"
